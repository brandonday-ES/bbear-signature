<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>B Bear's Very Official 5-Star Review</title>
<meta name="robots" content="noindex">
<meta property="og:title" content="B Bear's Very Official 5-Star Review">
<meta property="og:description" content="A classy establishment. Allegedly. Tap to inspect the evidence.">
<meta property="og:image" content="https://brandonday-es.github.io/bbear-signature/bear-barstool.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Lora:ital,wght@0,600&display=swap" rel="stylesheet">
<style>
  :root{--char:#0f0a07;--ember:#ff5a1f;--amber:#e8a04c;--bone:#f7eedd;--gold:#d98e2b;--dim:#8a7a66;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#0a0606;color:var(--bone);font-family:'Lora',Georgia,serif;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
  #bg{position:fixed;inset:0;z-index:0;background-image:url('bear-barstool.jpg');background-size:cover;background-position:center;filter:blur(18px) brightness(.4) saturate(1.3);transform:scale(1.1)}
  #bg::after{content:'';position:absolute;inset:0;background:radial-gradient(130% 100% at 50% 0%,rgba(255,90,31,.18),rgba(10,6,6,.85) 70%,rgba(8,4,4,.95))}
  #burst{position:fixed;inset:0;pointer-events:none;z-index:60}
  #door{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;cursor:pointer;transition:opacity .45s ease}
  #door.gone{opacity:0;pointer-events:none}
  .rating-label{font-size:13px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold)}
  .stars{font-size:clamp(46px,13vw,84px);letter-spacing:.06em;color:var(--amber);text-shadow:0 0 30px rgba(232,160,76,.45)}
  .stars.crack{animation:shake .1s 4}
  @keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-7px) rotate(-3deg)}75%{transform:translateX(7px) rotate(3deg)}100%{transform:translateX(0)}}
  .door-hint{font-size:14px;letter-spacing:.26em;text-transform:uppercase;color:var(--dim);animation:breathe 2.6s ease infinite}
  @keyframes breathe{0%,100%{opacity:.5}50%{opacity:1}}
  #reveal{position:relative;z-index:20;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 22px 56px;opacity:0;visibility:hidden;transition:opacity .9s ease .15s}
  #reveal.shown{opacity:1;visibility:visible}
  .bearwrap{width:min(92vw,640px);position:relative}
  .bearwrap img{width:100%;height:auto;display:block;border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.7);transform-origin:60% 80%}
  #reveal.shown .bearwrap img{animation:bearpop 1s cubic-bezier(.2,1.5,.4,1) .15s both, sway 2.8s ease-in-out 1.2s infinite}
  @keyframes bearpop{0%{transform:scale(.3) rotate(-8deg);opacity:0}60%{opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
  @keyframes sway{0%,100%{transform:rotate(-1.2deg) translateY(0)}50%{transform:rotate(1.2deg) translateY(-5px)}}
  .line{max-width:600px;text-align:center;margin-top:30px;font-family:'Rye',serif;font-size:clamp(26px,7vw,44px);line-height:1.15;color:var(--bone);text-shadow:0 2px 24px rgba(255,90,31,.3)}
  .sig{margin-top:24px;font-style:italic;font-size:22px;color:var(--amber);letter-spacing:.04em}
  .sig .pawkiss{font-style:normal;font-size:26px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:.2s!important}#burst{display:none}}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="burst"></canvas>

<div id="door" role="button" aria-label="Read the review">
  <div class="rating-label">Definitely Verified 5-Star Review</div>
  <div class="stars" id="stars">★★★★★</div>
  <div class="door-hint">tap before management sobers up</div>
</div>

<main id="reveal" aria-hidden="true">
  <div class="bearwrap"><img src="bear-barstool.jpg" alt="Drunk bear tangled around a barstool in a dive bar"></div>
  <div class="line">Ain't nothing five star quite like a dive bar.</div>
  <div class="sig">— B &nbsp;<span class="pawkiss">🐾💋</span></div>
</main>

<script>
(function(){
  var door=document.getElementById('door'),reveal=document.getElementById('reveal'),stars=document.getElementById('stars');
  var canvas=document.getElementById('burst'),ctx=canvas.getContext('2d');
  var opened=false,reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function size(){canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
  size();addEventListener('resize',size);
  var parts=[],G=['\u2605','\uD83C\uDF7A','\uD83D\uDD25','\uD83E\uDD74'];
  function boom(x,y){for(var i=0;i<90;i++){var a=Math.random()*Math.PI*2,sp=5+Math.random()*12,g=Math.random()<.4;
    parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,rot:Math.random()*6,vr:(Math.random()-.5)*.3,life:1,decay:.006+Math.random()*.008,size:g?16+Math.random()*16:2.5+Math.random()*4,glyph:g?G[(Math.random()*G.length)|0]:null,color:Math.random()<.5?'#ff5a1f':(Math.random()<.5?'#e8a04c':'#f7eedd')});}}
  var raf=null;
  function tick(){ctx.clearRect(0,0,innerWidth,innerHeight);for(var i=parts.length-1;i>=0;i--){var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.17;p.vx*=.99;p.rot+=p.vr;p.life-=p.decay;if(p.life<=0){parts.splice(i,1);continue;}ctx.save();ctx.globalAlpha=Math.max(p.life,0);ctx.translate(p.x,p.y);ctx.rotate(p.rot);if(p.glyph){ctx.font=p.size+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.glyph,0,0);}else{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(0,0,p.size,0,Math.PI*2);ctx.fill();}ctx.restore();}if(parts.length){raf=requestAnimationFrame(tick);}else{ctx.clearRect(0,0,innerWidth,innerHeight);raf=null;}}
  function open(e){if(opened)return;opened=true;var x=innerWidth/2,y=innerHeight/2;
    if(e&&e.touches&&e.touches[0]){x=e.touches[0].clientX;y=e.touches[0].clientY;}else if(e&&e.clientX){x=e.clientX;y=e.clientY;}
    stars.classList.add('crack');
    setTimeout(function(){
      if(!reduced){boom(x,y);setTimeout(function(){boom(innerWidth*.3,innerHeight*.4);},160);setTimeout(function(){boom(innerWidth*.7,innerHeight*.45);},320);if(!raf)raf=requestAnimationFrame(tick);}
      door.classList.add('gone');reveal.classList.add('shown');reveal.setAttribute('aria-hidden','false');
      setTimeout(function(){door.style.display='none';},460);
    },330);
  }
  door.addEventListener('click',open);door.addEventListener('touchstart',open,{passive:true});
})();
</script>
</body>
</html>
